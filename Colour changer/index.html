<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="body">
    <h1 class="main-heading">Color Palette Explorer</h1>

    <div class="color-picker-card">
        <h2>Select a Background Color:</h2>
        
        <div class="color-grid">
            <button onclick="background('#ff6b6b')" style="background-color: #ff6b6b;">Red</button>
            <button onclick="background('#ff9233')" style="background-color: #ff9233;">Orange</button>
            <button onclick="background('#ffd166')" style="background-color: #ffd166; color: #333;">Yellow</button>
            
            <button onclick="background('#4ea8de')" style="background-color: #4ea8de;">Blue</button>
            <button onclick="background('#06d6a0')" style="background-color: #06d6a0;">Green</button>
            <button onclick="background('#118ab2')" style="background-color: #118ab2;">Teal</button>
            
            <button onclick="background('#8338ec')" style="background-color: #8338ec;">Purple</button>
            <button onclick="background('#f15bb5')" style="background-color: #f15bb5;">Pink</button>
            <button onclick="background('#212529')" style="background-color: #212529;">Dark</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
